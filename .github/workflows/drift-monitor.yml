name: Drift and Bias Monitor

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours -- adjust to your traffic volume

permissions:
  contents: write   # to commit the report history
  actions: write     # to trigger the retraining workflow when alerting

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drift and bias check
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          MONITOR_API_KEY: ${{ secrets.MONITOR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python monitoring/drift_check.py

      - name: Commit report history
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add monitoring/history/
          git commit -m "Add drift/bias report $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "Nothing to commit"
          git push

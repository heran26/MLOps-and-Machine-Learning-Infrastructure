name: MLOps CI/CD Pipeline

on:
  workflow_dispatch: {}          # manual "Run workflow" button
  schedule:
    - cron: "0 3 * * 1"          # every Monday 03:00 UTC -- change as needed
  push:
    paths:
      - "src/**"                 # auto-run whenever training code changes

permissions:
  contents: write                # needed to commit the promoted model back

jobs:
  train-evaluate-deploy:
    runs-on: ubuntu-latest        # <- this is the cloud machine doing the work, not your PC
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q

      - name: Train candidate model
        working-directory: src
        run: python train.py

      - name: Evaluate candidate vs production
        id: eval
        working-directory: src
        run: python evaluate.py

      - name: Commit promoted model (only if it improved)
        if: steps.eval.outputs.deploy == 'true'
        run: |
          git config user.name "mlops-bot"
          git config user.email "mlops-bot@users.noreply.github.com"
          git add models/production_model.pkl models/production_metrics.json
          git commit -m "Auto-promote model, test accuracy=${{ steps.eval.outputs.accuracy }}" || echo "Nothing to commit"
          git push

      - name: Copy model + app to server
        if: steps.eval.outputs.deploy == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "models/production_model.pkl,serving/app.py,requirements.txt"
          target: "/home/${{ secrets.SSH_USER }}/ml-app"

      - name: Restart serving process on server
        if: steps.eval.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/ml-app
            pip install -r requirements.txt --quiet
            sudo systemctl restart ml-app.service

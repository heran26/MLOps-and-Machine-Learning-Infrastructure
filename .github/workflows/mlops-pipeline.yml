name: MLOps CI/CD Pipeline

on:
  workflow_dispatch: {}          # manual "Run workflow" button
  schedule:
    - cron: "0 3 * * 1"          # every Monday 03:00 UTC -- change as needed
  push:
    paths:
      - "src/**"                 # auto-run whenever training code changes

permissions:
  contents: write                # needed to commit the promoted model back

jobs:
  train-evaluate-deploy:
    runs-on: ubuntu-latest        # <- this is the cloud machine doing the work, not your PC
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q

      - name: Train candidate model
        working-directory: src
        run: python train.py

      - name: Evaluate candidate vs production
        id: eval
        working-directory: src
        run: python evaluate.py

      - name: Commit promoted model (only if it improved)
        if: steps.eval.outputs.deploy == 'true'
        run: |
          git config user.name "mlops-bot"
          git config user.email "mlops-bot@users.noreply.github.com"
          git add models/production_model.pkl models/production_metrics.json
          git commit -m "Auto-promote model, test accuracy=${{ steps.eval.outputs.accuracy }}" || echo "Nothing to commit"
          git push
          # Pushing to main is the deploy trigger: Render is connected to this repo
          # and auto-builds + redeploys whenever main changes. Since this push only
          # happens when deploy=='true', Render only ever redeploys an improved model.

      - name: Ping Render deploy hook (optional, speeds things up)
        if: steps.eval.outputs.deploy == 'true' && env.RENDER_DEPLOY_HOOK_URL != ''
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -X POST "$RENDER_DEPLOY_HOOK_URL"
